  <circle cx="70" cy="310" r="0.8" fill="#00cec9" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="100" r="0.7" fill="#6c5ce7" opacity="0.25"/>
