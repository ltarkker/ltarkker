  <circle cx="402" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="435" cy="310" r="0.4" fill="white" opacity="0.3"/>
  <circle cx="470" cy="45" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="510" cy="395" r="0.3" fill="white" opacity="0.25"/>
  <circle cx="555" cy="18" r="0.7" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="405" r="0.4" fill="white" opacity="0.3"/>
  <circle cx="660" cy="8" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="700" cy="410" r="0.3" fill="white" opacity="0.2"/>
  <circle cx="735" cy="20" r="0.6" fill="white" opacity="0.45"><animate attributeName="opacity" values="0.45;0.15;0.45" dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="380" r="0.4" fill="white" opacity="0.3"/>
  <circle cx="820" cy="15" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="860" cy="400" r="0.6" fill="white" opacity="0.35"/>
  <circle cx="905" cy="28" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="945" cy="370" r="0.3" fill="white" opacity="0.25"><animate attributeName="opacity" values="0.25;0.08;0.25" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="985" cy="55" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="1020" cy="390" r="0.4" fill="white" opacity="0.3"/>
  <circle cx="1060" cy="12" r="0.5" fill="white" opacity="0.45"/>
  <circle cx="1095" cy="350" r="0.3" fill="white" opacity="0.2"/>
  <circle cx="1130" cy="70" r="0.7" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="1170" cy="310" r="0.4" fill="white" opacity="0.3"/>
  <circle cx="40" cy="220" r="0.5" fill="white" opacity="0.35"/>
  <circle cx="90" cy="370" r="0.4" fill="white" opacity="0.25"/>
  <circle cx="190" cy="250" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="290" cy="200" r="0.4" fill="white" opacity="0.35"/>
  <circle cx="480" cy="130" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="530" cy="250" r="0.3" fill="white" opacity="0.2"/>
  <circle cx="750" cy="140" r="0.4" fill="white" opacity="0.3"/>
  <circle cx="870" cy="120" r="0.5" fill="white" opacity="0.35"/>
  <circle cx="960" cy="200" r="0.3" fill="white" opacity="0.25"/>
  <circle cx="1050" cy="180" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="1140" cy="250" r="0.4" fill="white" opacity="0.25"/>
  <!-- Bright stars -->
  <circle cx="95" cy="45" r="1.2" fill="white" opacity="0.7" filter="url(#tinyGlow)"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="320" cy="30" r="1" fill="white" opacity="0.6" filter="url(#tinyGlow)"/>
  <circle cx="1100" cy="40" r="1.1" fill="white" opacity="0.6" filter="url(#tinyGlow)"><animate attributeName="opacity" values="0.6;0.25;0.6" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="1160" cy="380" r="0.9" fill="white" opacity="0.5" filter="url(#tinyGlow)"/>
