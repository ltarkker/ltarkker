  <text x="600" y="410" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="10" fill="#4a5568" text-anchor="middle" letter-spacing="4" opacity="0.5">BUILDING INTELLIGENT SYSTEMS ON AZURE CLOUD</text>
