<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <radialGradient id="bgCenter" cx="50%" cy="60%" r="60%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#050608"/>
    </radialGradient>
    <radialGradient id="neb1" cx="15%" cy="65%" r="30%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="neb2" cx="85%" cy="35%" r="25%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="neb3" cx="40%" cy="20%" r="20%">
      <stop offset="0%" style="stop-color:#e17055;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="neb4" cx="70%" cy="80%" r="22%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="planetBody" cx="45%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="40%" style="stop-color:#0e2a3a"/>
      <stop offset="100%" style="stop-color:#091520"/>
    </radialGradient>
    <radialGradient id="planetAtmo" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#00cec9;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#00cec9;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#a29bfe;stop-opacity:0.3"/>
      <stop offset="85%" style="stop-color:#00cec9;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#a29bfe;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#6c5ce7;stop-opacity:0.15"/>
      <stop offset="80%" style="stop-color:#a29bfe;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00cec9;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shoot1" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shoot2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="planetGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="planetClipTop">
      <rect x="0" y="0" width="1200" height="278"/>
    </clipPath>
    <clipPath id="planetClipBottom">
      <rect x="0" y="278" width="1200" height="142"/>
    </clipPath>
    <path id="techOrbit1" d="M 730,290 A 140,40 -5 1 1 729.99,290" fill="none"/>
    <path id="techOrbit2" d="M 830,290 A 240,68 -3 1 1 829.99,290" fill="none"/>
  </defs>

  <!-- BACKGROUND -->
