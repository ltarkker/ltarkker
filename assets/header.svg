  <circle cx="180" cy="130" r="0.5" fill="#a29bfe" opacity="0.2"/>

  <!-- SHOOTING STARS -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.85;0" dur="9s" repeatCount="indefinite" begin="1.5s"/>
    <line x1="200" y1="35" x2="140" y2="70" stroke="url(#shoot1)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="200" cy="35" r="1.8" fill="white" filter="url(#tinyGlow)"/>
  </g>
  <g opacity="0">
