  <g><animateMotion dur="38s" repeatCount="indefinite" begin="0s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="5" fill="#e17055" opacity="0.9" filter="url(#softGlow)"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#e17055" text-anchor="middle" font-weight="600">YOLOv8</text>
  </g>
  <g><animateMotion dur="38s" repeatCount="indefinite" begin="-5.4s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="4.5" fill="#e17055" opacity="0.85"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#e17055" text-anchor="middle" font-weight="600">PyTorch</text>
  </g>
  <g><animateMotion dur="38s" repeatCount="indefinite" begin="-10.9s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="4" fill="#a29bfe" opacity="0.8"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#a29bfe" text-anchor="middle">TensorFlow</text>
