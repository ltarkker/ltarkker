<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#162447"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#00cec9;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orbit paths (invisible, used for animation) -->
    <path id="orbit1" d="M 730,240 A 130,45 -8 1 1 729.99,240" fill="none"/>
    <path id="orbit2" d="M 820,240 A 220,70 -5 1 1 819.99,240" fill="none"/>
    <path id="orbit3" d="M 920,240 A 320,95 -3 1 1 919.99,240" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1.2" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="80" r="0.8" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="300" cy="350" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="350" cy="50" r="0.7" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="370" r="1" fill="white" opacity="0.6"/>
  <circle cx="500" cy="40" r="0.9" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.15;0.4" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="550" cy="350" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="25" r="0.8" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="380" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="750" cy="15" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="830" cy="60" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="900" cy="370" r="1.1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="950" cy="30" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="1000" cy="350" r="0.7" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5.5s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="50" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="1100" cy="380" r="0.8" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.25;0.6" dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="1150" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="80" cy="300" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="160" cy="150" r="0.7" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="250" cy="280" r="1.1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="120" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="480" cy="290" r="1" fill="white" opacity="0.3"/>
  <circle cx="720" cy="130" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="850" cy="310" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="980" cy="150" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="1080" cy="280" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="170" cy="370" r="1" fill="#00cec9" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="1030" cy="90" r="0.8" fill="#00cec9" opacity="0.2"/>
  <circle cx="380" cy="300" r="0.6" fill="#e17055" opacity="0.3"/>
  <circle cx="870" cy="80" r="0.7" fill="#e17055" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="130" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Gonçalo L. Fernandes</text>
  <text x="600" y="162" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="15" fill="#8b949e" text-anchor="middle" letter-spacing="1">AI/ML Developer @ COSMOS-OMNI</text>

  <!-- Core glow -->
  <circle cx="600" cy="240" r="60" fill="url(#coreGlow)">
    <animate attributeName="r" values="55;65;55" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="240" r="14" fill="#0a0e1a" stroke="#00cec9" stroke-width="1.5" filter="url(#glow)"/>
  <text x="600" y="245" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#00cec9" text-anchor="middle">G</text>

  <!-- Visible orbit rings -->
  <ellipse cx="600" cy="240" rx="130" ry="45" fill="none" stroke="#00cec9" stroke-width="0.8" stroke-opacity="0.4" transform="rotate(-8, 600, 240)"/>
  <ellipse cx="600" cy="240" rx="220" ry="70" fill="none" stroke="#e17055" stroke-width="0.7" stroke-opacity="0.35" transform="rotate(-5, 600, 240)"/>
  <ellipse cx="600" cy="240" rx="320" ry="95" fill="none" stroke="#a29bfe" stroke-width="0.6" stroke-opacity="0.3" transform="rotate(-3, 600, 240)"/>

  <!-- ORBIT 1 — Teal (inner) -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" begin="0s">
      <mpath href="#orbit1"/>
    </animateMotion>
    <circle r="4" fill="#00cec9" opacity="0.9"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle">Azure</text>
  </g>
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" begin="-5s">
      <mpath href="#orbit1"/>
    </animateMotion>
    <circle r="4" fill="#00cec9" opacity="0.9"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle">Python</text>
  </g>
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" begin="-10s">
      <mpath href="#orbit1"/>
    </animateMotion>
    <circle r="3.5" fill="#00cec9" opacity="0.8"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle">OCR</text>
  </g>
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" begin="-15s">
      <mpath href="#orbit1"/>
    </animateMotion>
    <circle r="3.5" fill="#00cec9" opacity="0.8"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle">FastAPI</text>
  </g>

  <!-- ORBIT 2 — Orange (middle) -->
  <g>
    <animateMotion dur="30s" repeatCount="indefinite" begin="0s">
      <mpath href="#orbit2"/>
    </animateMotion>
    <circle r="4" fill="#e17055" opacity="0.9"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle">YOLOv8</text>
  </g>
  <g>
    <animateMotion dur="30s" repeatCount="indefinite" begin="-7.5s">
      <mpath href="#orbit2"/>
    </animateMotion>
    <circle r="4" fill="#e17055" opacity="0.9"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle">PyTorch</text>
  </g>
  <g>
    <animateMotion dur="30s" repeatCount="indefinite" begin="-15s">
      <mpath href="#orbit2"/>
    </animateMotion>
    <circle r="3.5" fill="#e17055" opacity="0.8"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle">Docker</text>
  </g>
  <g>
    <animateMotion dur="30s" repeatCount="indefinite" begin="-22.5s">
      <mpath href="#orbit2"/>
    </animateMotion>
    <circle r="3.5" fill="#e17055" opacity="0.8"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle">GenAI</text>
  </g>

  <!-- ORBIT 3 — Purple (outer) -->
  <g>
    <animateMotion dur="40s" repeatCount="indefinite" begin="0s">
      <mpath href="#orbit3"/>
    </animateMotion>
    <circle r="4" fill="#a29bfe" opacity="0.8"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle">TensorFlow</text>
  </g>
  <g>
    <animateMotion dur="40s" repeatCount="indefinite" begin="-6.7s">
      <mpath href="#orbit3"/>
    </animateMotion>
    <circle r="4" fill="#a29bfe" opacity="0.8"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle">OpenCV</text>
  </g>
  <g>
    <animateMotion dur="40s" repeatCount="indefinite" begin="-13.3s">
      <mpath href="#orbit3"/>
    </animateMotion>
    <circle r="3.5" fill="#a29bfe" opacity="0.7"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle">Redis</text>
  </g>
  <g>
    <animateMotion dur="40s" repeatCount="indefinite" begin="-20s">
      <mpath href="#orbit3"/>
    </animateMotion>
    <circle r="3.5" fill="#a29bfe" opacity="0.7"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle">HuggingFace</text>
  </g>
  <g>
    <animateMotion dur="40s" repeatCount="indefinite" begin="-26.7s">
      <mpath href="#orbit3"/>
    </animateMotion>
    <circle r="3" fill="#a29bfe" opacity="0.6"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle">NLP</text>
  </g>
  <g>
    <animateMotion dur="40s" repeatCount="indefinite" begin="-33.3s">
      <mpath href="#orbit3"/>
    </animateMotion>
    <circle r="3" fill="#a29bfe" opacity="0.6"/>
    <text y="-10" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle">MLOps</text>
  </g>

  <!-- Quote -->
  <text x="600" y="370" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" font-style="italic" opacity="0.6">" Building intelligent systems on Azure Cloud "</text>
</svg>
