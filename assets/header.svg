  <!-- NAME -->
  <text x="600" y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">Gonçalo L. Fernandes</text>
  <text font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle" letter-spacing="2" y="105">
    <tspan x="560" fill="#8b949e">AI/ML Developer @</tspan>
    <tspan dx="6" fill="#00cec9" font-weight="700" letter-spacing="3" filter="url(#softGlow)">COSMOS-OMNI</tspan>
  </text>
  <line x1="450" y1="125" x2="750" y2="125" stroke="url(#shimmer)" stroke-width="0.6" opacity="0.4"/>

  <!-- SATURN PLANET -->
