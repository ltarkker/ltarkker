<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#162447"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#00cec9;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="120" cy="80" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="300" cy="350" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="350" cy="50" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="450" cy="370" r="1" fill="white" opacity="0.6"/>
  <circle cx="500" cy="40" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="550" cy="350" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="25" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="700" cy="380" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="750" cy="15" r="1" fill="white" opacity="0.7"/>
  <circle cx="830" cy="60" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="900" cy="370" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="950" cy="30" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="1000" cy="350" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="1050" cy="50" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="1100" cy="380" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="1150" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="80" cy="300" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="160" cy="150" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="250" cy="280" r="1.1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="120" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="480" cy="290" r="1" fill="white" opacity="0.3"/>
  <circle cx="720" cy="130" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="850" cy="310" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="980" cy="150" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="1080" cy="280" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="170" cy="370" r="1" fill="#00cec9" opacity="0.3"/>
  <circle cx="1030" cy="90" r="0.8" fill="#00cec9" opacity="0.2"/>
  <circle cx="380" cy="300" r="0.6" fill="#e17055" opacity="0.3"/>
  <circle cx="870" cy="80" r="0.7" fill="#e17055" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="130" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#softGlow)">Gonçalo L. Fernandes</text>
  <text x="600" y="162" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="15" fill="#8b949e" text-anchor="middle" letter-spacing="1">AI/ML Developer @ COSMOS-OMNI</text>

  <!-- Core glow -->
  <circle cx="600" cy="240" r="60" fill="url(#coreGlow)"/>
  <circle cx="600" cy="240" r="14" fill="#0a0e1a" stroke="#00cec9" stroke-width="1.5" filter="url(#glow)"/>
  <text x="600" y="245" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" fill="#00cec9" text-anchor="middle">G</text>

  <!-- Orbit 1 (inner) - teal -->
  <ellipse cx="600" cy="240" rx="130" ry="45" fill="none" stroke="#00cec9" stroke-width="0.8" stroke-opacity="0.4" transform="rotate(-8, 600, 240)"/>
  <!-- Tech on orbit 1 -->
  <circle cx="480" cy="225" r="4" fill="#00cec9" opacity="0.8"/>
  <text x="480" y="215" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle" opacity="0.9">Azure</text>
  <circle cx="720" cy="250" r="4" fill="#00cec9" opacity="0.8"/>
  <text x="720" y="268" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle" opacity="0.9">Python</text>
  <circle cx="540" cy="275" r="3.5" fill="#00cec9" opacity="0.7"/>
  <text x="540" y="293" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle" opacity="0.9">OCR</text>
  <circle cx="660" cy="210" r="3.5" fill="#00cec9" opacity="0.7"/>
  <text x="660" y="200" font-family="'Courier New', monospace" font-size="11" fill="#00cec9" text-anchor="middle" opacity="0.9">FastAPI</text>

  <!-- Orbit 2 (middle) - orange -->
  <ellipse cx="600" cy="240" rx="220" ry="70" fill="none" stroke="#e17055" stroke-width="0.7" stroke-opacity="0.35" transform="rotate(-5, 600, 240)"/>
  <!-- Tech on orbit 2 -->
  <circle cx="395" cy="210" r="4" fill="#e17055" opacity="0.8"/>
  <text x="395" y="200" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle" opacity="0.9">YOLOv8</text>
  <circle cx="805" cy="265" r="4" fill="#e17055" opacity="0.8"/>
  <text x="805" y="283" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle" opacity="0.9">PyTorch</text>
  <circle cx="450" cy="290" r="3.5" fill="#e17055" opacity="0.7"/>
  <text x="450" y="308" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle" opacity="0.9">Docker</text>
  <circle cx="750" cy="190" r="3.5" fill="#e17055" opacity="0.7"/>
  <text x="750" y="180" font-family="'Courier New', monospace" font-size="11" fill="#e17055" text-anchor="middle" opacity="0.9">GenAI</text>

  <!-- Orbit 3 (outer) - purple/lavender -->
  <ellipse cx="600" cy="240" rx="320" ry="95" fill="none" stroke="#a29bfe" stroke-width="0.6" stroke-opacity="0.3" transform="rotate(-3, 600, 240)"/>
  <!-- Tech on orbit 3 -->
  <circle cx="295" cy="200" r="4" fill="#a29bfe" opacity="0.7"/>
  <text x="295" y="190" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle" opacity="0.8">TensorFlow</text>
  <circle cx="905" cy="275" r="4" fill="#a29bfe" opacity="0.7"/>
  <text x="905" y="293" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle" opacity="0.8">OpenCV</text>
  <circle cx="350" cy="310" r="3.5" fill="#a29bfe" opacity="0.6"/>
  <text x="350" y="328" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle" opacity="0.8">Redis</text>
  <circle cx="850" cy="170" r="3.5" fill="#a29bfe" opacity="0.6"/>
  <text x="850" y="160" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle" opacity="0.8">HuggingFace</text>
  <circle cx="920" cy="210" r="3" fill="#a29bfe" opacity="0.5"/>
  <text x="920" y="200" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle" opacity="0.8">NLP</text>
  <circle cx="280" cy="270" r="3" fill="#a29bfe" opacity="0.5"/>
  <text x="280" y="260" font-family="'Courier New', monospace" font-size="11" fill="#a29bfe" text-anchor="middle" opacity="0.8">MLOps</text>

  <!-- Quote -->
  <text x="600" y="370" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" font-style="italic" opacity="0.6">" Building intelligent systems on Azure Cloud "</text>
</svg>
