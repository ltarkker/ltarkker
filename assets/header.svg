  <g><animateMotion dur="38s" repeatCount="indefinite" begin="-16.3s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="4" fill="#a29bfe" opacity="0.75"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#a29bfe" text-anchor="middle">OpenCV</text>
  </g>
  <g><animateMotion dur="38s" repeatCount="indefinite" begin="-21.7s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="3.5" fill="#e17055" opacity="0.75"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#e17055" text-anchor="middle">Docker</text>
  </g>
  <g><animateMotion dur="38s" repeatCount="indefinite" begin="-27.1s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="3.5" fill="#a29bfe" opacity="0.7"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#a29bfe" text-anchor="middle">GenAI</text>
  </g>
  <g><animateMotion dur="38s" repeatCount="indefinite" begin="-32.6s"><mpath href="#techOrbit2"/></animateMotion>
    <circle r="3.5" fill="#a29bfe" opacity="0.65"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#a29bfe" text-anchor="middle">MLOps</text>
  </g>

  <!-- TINY MOONS -->
  <circle cx="430" cy="200" r="3" fill="#1a2332" stroke="#6c5ce7" stroke-width="0.5" stroke-opacity="0.4">
    <animate attributeName="cy" values="200;195;200" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="340" r="2" fill="#1a2332" stroke="#e17055" stroke-width="0.5" stroke-opacity="0.3">
