  <circle cx="590" cy="278" r="70" fill="#00cec9" opacity="0.06" filter="url(#planetGlow)">
    <animate attributeName="opacity" values="0.06;0.1;0.06" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Ring back -->
  <ellipse cx="590" cy="278" rx="155" ry="30" fill="none" stroke="url(#ringGrad1)" stroke-width="12" stroke-opacity="0.5" transform="rotate(-8, 590, 278)" clip-path="url(#planetClipTop)"/>
  <ellipse cx="590" cy="278" rx="185" ry="36" fill="none" stroke="url(#ringGrad2)" stroke-width="6" stroke-opacity="0.3" transform="rotate(-8, 590, 278)" clip-path="url(#planetClipTop)"/>
  <!-- Planet body -->
  <circle cx="590" cy="278" r="52" fill="url(#planetBody)"/>
  <circle cx="590" cy="278" r="52" fill="url(#planetAtmo)"/>
  <ellipse cx="590" cy="262" rx="48" ry="4" fill="#00cec9" opacity="0.06"/>
  <ellipse cx="590" cy="272" rx="50" ry="3" fill="#a29bfe" opacity="0.04"/>
  <ellipse cx="590" cy="285" rx="49" ry="4" fill="#00cec9" opacity="0.05"/>
  <ellipse cx="590" cy="295" rx="46" ry="3" fill="#6c5ce7" opacity="0.04"/>
  <circle cx="590" cy="278" r="52" fill="none" stroke="#00cec9" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Ring front -->
  <ellipse cx="590" cy="278" rx="155" ry="30" fill="none" stroke="url(#ringGrad1)" stroke-width="12" stroke-opacity="0.5" transform="rotate(-8, 590, 278)" clip-path="url(#planetClipBottom)"/>
  <ellipse cx="590" cy="278" rx="185" ry="36" fill="none" stroke="url(#ringGrad2)" stroke-width="6" stroke-opacity="0.3" transform="rotate(-8, 590, 278)" clip-path="url(#planetClipBottom)"/>

  <!-- TECH SATELLITES - Inner orbit (teal) -->
  <g><animateMotion dur="24s" repeatCount="indefinite" begin="0s"><mpath href="#techOrbit1"/></animateMotion>
    <circle r="5" fill="#00cec9" opacity="0.9" filter="url(#softGlow)"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#00cec9" text-anchor="middle" font-weight="600">Azure</text>
  </g>
  <g><animateMotion dur="24s" repeatCount="indefinite" begin="-6s"><mpath href="#techOrbit1"/></animateMotion>
    <circle r="4.5" fill="#00cec9" opacity="0.85"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#00cec9" text-anchor="middle" font-weight="600">Python</text>
  </g>
  <g><animateMotion dur="24s" repeatCount="indefinite" begin="-12s"><mpath href="#techOrbit1"/></animateMotion>
    <circle r="4" fill="#00cec9" opacity="0.8"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#00cec9" text-anchor="middle">OCR</text>
  </g>
  <g><animateMotion dur="24s" repeatCount="indefinite" begin="-18s"><mpath href="#techOrbit1"/></animateMotion>
    <circle r="4" fill="#00cec9" opacity="0.8"/>
    <text y="-12" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#00cec9" text-anchor="middle">FastAPI</text>
  </g>

